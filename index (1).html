<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador PDF - Checklist FC-PR-35</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0; padding: 0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .status-container { text-align: center; padding: 40px; }
    .status-container h1 { font-size: 22px; margin-bottom: 8px; }
    .status-container p { color: #94a3b8; font-size: 14px; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #334155; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 24px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color: #22c55e; }
    .error { color: #ef4444; }
    .btn-download {
      display: inline-block; margin-top: 20px; padding: 12px 28px;
      background: #3b82f6; color: white; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-download:hover { background: #2563eb; }

    /* ===== PDF CONTENT — FC-PR-35 EXACT ===== */
    #pdf-content {
      position: absolute; left: -9999px; top: 0;
      width: 770px;
      background: white; color: black;
      font-family: 'Arial', sans-serif;
      font-size: 9px;
      padding: 20px 25px;
      box-sizing: border-box;
    }
    #pdf-content table { width: 100%; border-collapse: collapse; }
    #pdf-content th, #pdf-content td {
      border: 1px solid #000; padding: 2px 4px;
      vertical-align: middle; font-size: 8.5px; line-height: 1.3;
    }
    .hdr-table td { text-align: center; font-size: 8.5px; padding: 3px 5px; }
    .hdr-left { width: 22%; font-weight: bold; font-size: 9px; background: #d6e6f5; }
    .hdr-center { width: 48%; font-weight: bold; font-size: 11px; background: #d6e6f5; }
    .hdr-right { width: 30%; font-size: 8px; text-align: left; padding-left: 8px; background: #d6e6f5; }
    .hdr-prep td { font-size: 8.5px; padding: 3px 8px; text-align: left; background: #eef4fb; }
    .lot-table td { padding: 4px 6px; font-size: 9px; }
    .lot-label { font-weight: bold; background: #eef4fb; text-align: center; width: 12%; }
    .lot-value { width: 13%; text-align: center; }
    .items-hdr { background: #d6e6f5 !important; font-weight: bold; text-align: center; font-size: 8.5px; }
    .items-table td { font-size: 8.5px; padding: 2px 4px; }
    .items-table .item-text { text-align: left; }
    .items-table .item-si, .items-table .item-no { width: 4%; text-align: center; font-weight: bold; }
    .items-table .item-obs { width: 30%; text-align: left; }
    .mark-yes { color: #16a34a; font-size: 11px; font-weight: bold; }
    .mark-no { color: #dc2626; font-size: 11px; font-weight: bold; }
    .sec7-hdr td { text-align: left; font-size: 8.5px; padding: 3px 5px; font-weight: bold; }
    .caract-hdr td { text-align: center; font-weight: bold; font-size: 8px; background: #d6e6f5; padding: 2px 3px; }
    .samples-hdr th {
      background: #d6e6f5; font-size: 7.5px; font-weight: bold;
      text-align: center; padding: 2px 2px;
    }
    .samples-body td { text-align: center; font-size: 8.5px; padding: 3px 2px; height: 14px; }
    .samples-body td.conf { color: #16a34a; font-weight: bold; }
    .samples-body td.nconf { color: #dc2626; font-weight: bold; }
    .crossed { text-decoration: line-through; color: #999; }
    .notes-block { margin-top: 6px; font-size: 7px; line-height: 1.4; color: #222; }
    .notes-block b { font-size: 7.5px; }
    .notes-block p { margin: 1px 0; }
    .noconf-title { font-weight: bold; font-size: 9px; text-align: center; text-decoration: underline; margin: 10px 0 5px 0; }
    .noconf-block { font-size: 8.5px; line-height: 1.6; padding: 0 5px; }
    .noconf-block .checkbox {
      display: inline-block; width: 10px; height: 10px;
      border: 1px solid #000; text-align: center;
      font-size: 8px; line-height: 10px; margin: 0 2px; vertical-align: middle;
    }
    .noconf-block .checkbox.checked { background: #d6e6f5; font-weight: bold; }
    .doc-footer { text-align: center; font-size: 7px; color: #555; margin-top: 12px; border-top: 1px solid #ccc; padding-top: 4px; }
  </style>
</head>
<body>
  <div class="status-container" id="statusUI">
    <h1>Generando PDF del Checklist</h1>
    <p>FC-PR-35 — Lista de Chequeo para Recibo de Componentes de Empaque</p>
    <div class="spinner" id="spinner"></div>
    <p id="statusMsg">Procesando datos...</p>
  </div>

  <div id="pdf-content"></div>

  <script>
    function getChecklistData() {
      const params = new URLSearchParams(window.location.search);
      const dataStr = params.get('data');
      if (!dataStr) throw new Error('No se recibieron datos. Abre esta página desde Power Apps.');
      try { return JSON.parse(decodeURIComponent(dataStr)); }
      catch (e) { throw new Error('Error al leer los datos: ' + e.message); }
    }

    function renderChecklist(data) {
      const muestras = typeof data.muestras === 'string'
        ? JSON.parse(data.muestras) : (data.muestras || []);
      const tamMuestreo = parseInt(data.tamMuestreo) || 12;

      // Sample rows
      let samplesRows = '';
      for (let i = 0; i < Math.max(tamMuestreo, muestras.length); i++) {
        const m = muestras[i];
        if (m) {
          const cv = (v) => typeof v === 'string' ? v : (v && v.Value ? v.Value : '');
          const cc = (v) => { const val = cv(v); return val === 'Conforme' ? 'conf' : val === 'No Conforme' ? 'nconf' : ''; };
          const ct = (v) => { const val = cv(v); return val === 'Conforme' ? 'C' : val === 'No Conforme' ? 'NC' : val; };
          samplesRows += `<tr class="samples-body">
            <td>${m.Numero_Muestra || m.num || (i+1)}</td>
            <td class="${cc(m.ColorTextura||m.color)}">${ct(m.ColorTextura||m.color)}</td>
            <td class="${cc(m.AparienciaExt||m.apExt)}">${ct(m.AparienciaExt||m.apExt)}</td>
            <td class="${cc(m.AparienciaInt||m.apInt)}">${ct(m.AparienciaInt||m.apInt)}</td>
            <td class="${cc(m.Poro||m.poro)}">${ct(m.Poro||m.poro)}</td>
            <td class="${cc(m.Artes||m.artes)}">${ct(m.Artes||m.artes)}</td>
            <td class="crossed">—</td><td class="crossed">—</td>
            <td class="crossed">—</td><td class="crossed">—</td></tr>`;
        } else {
          samplesRows += `<tr class="samples-body">
            <td></td><td></td><td></td><td></td><td></td><td></td>
            <td class="crossed"></td><td class="crossed"></td>
            <td class="crossed"></td><td class="crossed"></td></tr>`;
        }
      }

      const sm = (val) => {
        if (!val) return { si: '', no: '' };
        const y = val === 'Sí' || val === 'Si';
        return { si: y ? '<span class="mark-yes">✓</span>' : '', no: !y ? '<span class="mark-no">✓</span>' : '' };
      };
      const i1=sm(data.item1), i2=sm(data.item2), i3=sm(data.item3);
      const i4=sm(data.item4), i5=sm(data.item5);
      const rechazo = data.rechazo || 'N/A';

      document.getElementById('pdf-content').innerHTML = `
        <!-- HEADER -->
        <table class="hdr-table" style="margin-bottom:0;">
          <tr>
            <td class="hdr-left" rowspan="2">PLANTA CALLAO SGC</td>
            <td class="hdr-center" rowspan="2">LISTA DE CHEQUEO PARA EL RECIBO DE<br>COMPONENTES DE EMPAQUE</td>
            <td class="hdr-right" style="font-weight:bold;">FORMATO<br>FC-PR-35</td>
          </tr>
          <tr>
            <td class="hdr-right">Rev. 17 /04-10-2024<br>Aprobado Por: Freddy Medina</td>
          </tr>
        </table>
        <table class="hdr-table" style="margin-bottom:8px;">
          <tr class="hdr-prep">
            <td style="width:50%;">Preparado Por: ${data.preparador||''}</td>
            <td style="width:50%;">Revisado Por: ${data.revisor||''}</td>
          </tr>
        </table>

        <!-- LOT INFO -->
        <table class="lot-table" style="margin-bottom:6px;">
          <tr>
            <td class="lot-label">No. Lote:</td>
            <td class="lot-value"><strong>${data.lote||''}</strong></td>
            <td class="lot-label">Producto:</td>
            <td class="lot-value"><strong>${data.producto||''}</strong></td>
            <td class="lot-label">Fecha:</td>
            <td class="lot-value">${data.fecha||''}</td>
            <td class="lot-label">Tamaño del lote:</td>
            <td class="lot-value">${data.tamLote||''}</td>
          </tr>
        </table>

        <!-- ITEMS -->
        <table class="items-table">
          <tr>
            <td class="items-hdr" style="width:62%;">ITEMS</td>
            <td class="items-hdr" style="width:4%;">Si</td>
            <td class="items-hdr" style="width:4%;">No</td>
            <td class="items-hdr" style="width:30%;">Comentarios / Observaciones</td>
          </tr>
          <tr><td class="item-text">1. Transporte con condiciones apropiadas (¿es seguro para descargar?).</td><td class="item-si">${i1.si}</td><td class="item-no">${i1.no}</td><td class="item-obs">${data.item1obs||''}</td></tr>
          <tr><td class="item-text">2. Daños visibles en componentes debido al transporte.</td><td class="item-si">${i2.si}</td><td class="item-no">${i2.no}</td><td class="item-obs">${data.item2obs||''}</td></tr>
          <tr><td class="item-text">3. La cantidad en la Guía de entrega es igual a la cantidad entregada.</td><td class="item-si">${i3.si}</td><td class="item-no">${i3.no}</td><td class="item-obs">${data.item3obs||''}</td></tr>
          <tr><td class="item-text">4. Cantidad recibida igual a cantidad ordenada.</td><td class="item-si">${i4.si}</td><td class="item-no">${i4.no}</td><td class="item-obs">${data.item4obs||''}</td></tr>
          <tr><td class="item-text">5. Certificado de calidad es entregado con los componentes.</td><td class="item-si">${i5.si}</td><td class="item-no">${i5.no}</td><td class="item-obs">${data.item5obs||''}</td></tr>
          <tr><td class="item-text">6. Cantidad de unidades de empaque inspeccionadas.</td><td colspan="2" style="text-align:center;font-weight:bold;">${data.item6||''}</td><td class="item-obs">${data.item6obs||''}</td></tr>
        </table>

        <!-- SECTION 7 -->
        <table style="margin-top:0;">
          <tr class="sec7-hdr"><td colspan="10" style="border-bottom:0;">7. Los componentes cumplen los requerimientos de:</td></tr>
          <tr class="caract-hdr"><td colspan="10">Características Verificadas</td></tr>
        </table>
        <table>
          <tr class="samples-hdr">
            <th rowspan="3" style="width:7%;">N°<br>muestra</th>
            <th rowspan="3" style="width:11%;">Color y<br>Textura<br><small>(1)</small></th>
            <th rowspan="3" style="width:11%;">Apariencia<br>Exterior<br><small>(2)</small></th>
            <th rowspan="3" style="width:11%;">Apariencia<br>Interior<br><small>(3)</small></th>
            <th rowspan="3" style="width:8%;">Poro<br><small>(4)</small></th>
            <th rowspan="3" style="width:14%;"><span style="font-size:8px;">ARTES <small>(5)</small></span><br><br><small>Información<br>completa y<br>correcta</small></th>
            <th colspan="2" style="width:14%;"><s>PESO (g)</s><br><small><s>(6)</s></small></th>
            <th colspan="2" style="width:14%;"><s>DIMENSIONES (mm)</s><br><small><s>(7)</s></small></th>
          </tr>
          <tr class="samples-hdr">
            <th><s>Rango</s></th><th><s>Valor</s></th>
            <th><s>Rango</s></th><th><s>Valor</s></th>
          </tr>
          ${samplesRows}
        </table>

        <!-- NOTES -->
        <div class="notes-block">
          <p><b>Notas:</b></p>
          <p><b>(1)</b> Verificar color y textura en baldes/bombonas/botellas/cilindros/etiquetas, que estén de acuerdo con el <u>patrón físico</u> aprobado.</p>
          <p><b>(2)</b> Que estén limpio externamente (baldes/bombonas/botellas/cilindros/etiquetas/cajas simples y corrugadas). Sin abolladuras. <u>Además</u> para las cajas corrugadas verificar que no estén mojadas o con manchas de agua.</p>
          <p><b>(3)</b> En botellas/baldes/bombonas/cilindros: Verificar visualmente la limpieza interior, sin polvo, sin material extraño.</p>
          <p><b>(4)</b> Verificar que las botellas/baldes/bombonas de plástico no tengan poros o cortes en el cuerpo del envase.</p>
          <p><b>(5)</b> Aplica a etiquetas/litografía/cajas simples y corrugadas/láminas en baldes/bombonas/<u>sachets</u>. El texto debe ser claro y <u>de acuerdo al</u> estándar aprobado. La información debe ser completa y correcta <u>de acuerdo al</u> estándar aprobado.</p>
          <p style="margin-left:16px;">Solo para el caso de cilindros, verificar que el nombre del producto en el cuerpo del envase (Volvo y Caterpillar) esté claro, sin pintura choreada, <u>de acuerdo al</u> estándar.</p>
          <p><s><b>(6)</b> & <b>(7)</b> Aplica a las cajas simples y corrugadas.</s> <em style="color:#999;">N/A</em></p>
        </div>

        <!-- NON-CONFORMITY -->
        <div class="noconf-title">En Caso de Componentes No Conformes</div>
        <div class="noconf-block">
          <p>1. Se rechaza todo el lote: &nbsp;
            <strong>SI</strong> <span class="checkbox ${rechazo==='Sí'||rechazo==='Si'?'checked':''}">${rechazo==='Sí'||rechazo==='Si'?'✓':''}</span> &nbsp;&nbsp;
            <strong>NO</strong> <span class="checkbox ${rechazo==='No'?'checked':''}">${rechazo==='No'?'✓':''}</span> &nbsp;
            <span style="font-size:7.5px;">(si marcó No, continuar en 2)</span>
          </p>
          ${rechazo==='No'?`
          <p>2. Todo el lote debe ser revisado en la planta:</p>
          <p style="margin-left:16px;">Cantidad aceptada: <strong>${data.cantAcep||'________'}</strong> &nbsp;&nbsp;&nbsp;&nbsp; Cantidad rechazada: <strong>${data.cantRech||'________'}</strong></p>
          <p style="margin-left:16px;">Comentarios de la revisión:</p>
          <p style="margin-left:16px;">${data.comentNC||'...................................................................................................................'}</p>
          `:rechazo==='N/A'?`<p style="color:#888;font-style:italic;">No aplica — todos los componentes conformes.</p>`:`
          <p>2. Todo el lote fue rechazado.</p>${data.comentNC?`<p style="margin-left:16px;">Comentarios: ${data.comentNC}</p>`:''}`}
        </div>

        <!-- SIGNATURES -->
        <div style="margin-top:16px;border-top:1px dotted #999;padding-top:8px;">
          <table style="border:none;width:100%;">
            <tr>
              <td style="border:none;width:50%;padding:4px 8px;font-size:8.5px;vertical-align:top;">
                <div>Inspección realizada por:</div>
                <div style="border-bottom:1px solid #000;min-height:20px;margin-top:8px;"></div>
                <div style="margin-top:3px;font-size:8px;">${data.inspector||''}</div>
              </td>
              <td style="border:none;width:50%;padding:4px 8px;font-size:8.5px;vertical-align:top;">
                <div>Aprobado por: <span style="font-size:7px;">(solo por el caso de no-conformidad)</span></div>
                <div style="border-bottom:1px solid #000;min-height:20px;margin-top:8px;"></div>
                <div style="margin-top:3px;font-size:8px;">${data.aprobador||''}</div>
              </td>
            </tr>
          </table>
        </div>
        <div class="doc-footer">FC-PR-35 (Rev 17 /04-10-2024)</div>`;
    }

    async function generatePDF(data) {
      const p = (data.producto||'PRODUCTO').replace(/[\s\.]+/g,'-');
      const l = (data.lote||'LOTE').replace(/[\s\.]+/g,'-');
      const f = (data.fecha||'').replace(/\//g,'');
      const filename = `CHK_${p}_${l}_${f}.pdf`;
      const el = document.getElementById('pdf-content');
      const opt = {
        margin: [8,8,8,8], filename,
        image: {type:'jpeg',quality:0.98},
        html2canvas: {scale:2,useCORS:true,letterRendering:true,width:770},
        jsPDF: {unit:'mm',format:'a4',orientation:'portrait'},
        pagebreak: {mode:['avoid-all','css','legacy']}
      };
      el.style.left='0'; el.style.position='relative';
      await html2pdf().set(opt).from(el).save();
      el.style.left='-9999px'; el.style.position='absolute';
      return filename;
    }

    async function main() {
      const msg = document.getElementById('statusMsg');
      const sp = document.getElementById('spinner');
      try {
        msg.textContent = 'Leyendo datos del checklist...';
        const data = getChecklistData();
        msg.textContent = 'Generando formato FC-PR-35...';
        renderChecklist(data);
        await new Promise(r=>setTimeout(r,500));
        msg.textContent = 'Convirtiendo a PDF...';
        const fn = await generatePDF(data);
        sp.style.display = 'none';
        msg.innerHTML = `<span class="success">✓ PDF generado exitosamente</span><br><br>
          <span style="color:#94a3b8;font-size:13px;">Archivo: <strong>${fn}</strong></span><br>
          <span style="color:#94a3b8;font-size:12px;">El PDF se descargó automáticamente.</span><br>
          <span style="color:#94a3b8;font-size:12px;">Súbelo a la carpeta Checklists_PDF en SharePoint.</span>`;
        const btn = document.createElement('button');
        btn.className='btn-download'; btn.textContent='Descargar nuevamente';
        btn.onclick=()=>generatePDF(data);
        msg.appendChild(document.createElement('br'));
        msg.appendChild(document.createElement('br'));
        msg.appendChild(btn);
        const btnC = document.createElement('button');
        btnC.className='btn-download'; btnC.style.background='#334155';
        btnC.style.marginLeft='12px'; btnC.textContent='Cerrar';
        btnC.onclick=()=>window.close();
        msg.appendChild(btnC);
      } catch(err) {
        sp.style.display='none';
        msg.innerHTML = `<span class="error">✗ Error: ${err.message}</span><br><br>
          <span style="color:#94a3b8;font-size:12px;">Verifica que hayas abierto esta página desde Power Apps.</span>`;
      }
    }
    window.addEventListener('DOMContentLoaded', main);
  </script>
</body>
</html>
