<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador PDF - Checklist FC-PR-35</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    /* ===== STYLES FOR THE UI (not the PDF) ===== */
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .status-container {
      text-align: center;
      padding: 40px;
    }
    .status-container h1 {
      font-size: 22px;
      margin-bottom: 8px;
    }
    .status-container p {
      color: #94a3b8;
      font-size: 14px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color: #22c55e; }
    .error { color: #ef4444; }
    .btn-download {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 28px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-download:hover { background: #2563eb; }

    /* ===== STYLES FOR THE PDF CONTENT (FC-PR-35 format) ===== */
    #pdf-content {
      position: absolute;
      left: -9999px;
      top: 0;
      width: 770px;
      background: white;
      color: black;
      font-family: 'Arial', sans-serif;
      font-size: 10px;
      padding: 30px 35px;
      box-sizing: border-box;
    }
    #pdf-content .doc-title {
      text-align: center;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 12px;
      border-bottom: 2px solid black;
      padding-bottom: 6px;
    }
    #pdf-content .doc-code {
      text-align: right;
      font-size: 9px;
      color: #555;
      margin-bottom: 10px;
    }
    #pdf-content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
    }
    #pdf-content th, #pdf-content td {
      border: 1px solid #333;
      padding: 4px 6px;
      text-align: left;
      font-size: 9.5px;
      vertical-align: top;
    }
    #pdf-content th {
      background: #e5e5e5;
      font-weight: bold;
      text-align: center;
    }
    #pdf-content .header-table td {
      border: 1px solid #333;
      padding: 5px 8px;
      font-size: 10px;
    }
    #pdf-content .header-table .label {
      font-weight: bold;
      background: #f0f0f0;
      width: 25%;
    }
    #pdf-content .header-table .value {
      width: 25%;
    }
    #pdf-content .items-table td:nth-child(1) {
      width: 55%;
    }
    #pdf-content .items-table td:nth-child(2),
    #pdf-content .items-table td:nth-child(3) {
      width: 6%;
      text-align: center;
    }
    #pdf-content .items-table td:nth-child(4) {
      width: 33%;
    }
    #pdf-content .check-mark {
      font-weight: bold;
      font-size: 12px;
    }
    #pdf-content .check-yes { color: #16a34a; }
    #pdf-content .check-no { color: #dc2626; }
    #pdf-content .section-title {
      font-weight: bold;
      font-size: 10px;
      margin: 14px 0 6px 0;
      background: #e5e5e5;
      padding: 4px 8px;
      border: 1px solid #333;
    }
    #pdf-content .samples-table th {
      font-size: 8.5px;
      padding: 3px 4px;
    }
    #pdf-content .samples-table td {
      text-align: center;
      font-size: 9px;
      padding: 3px 4px;
    }
    #pdf-content .samples-table td.conforme {
      color: #16a34a;
      font-weight: bold;
    }
    #pdf-content .samples-table td.no-conforme {
      color: #dc2626;
      font-weight: bold;
    }
    #pdf-content .notes-section {
      font-size: 8px;
      color: #333;
      margin-top: 10px;
      line-height: 1.5;
    }
    #pdf-content .notes-section p {
      margin: 2px 0;
    }
    #pdf-content .noconf-table td {
      padding: 5px 8px;
      font-size: 9.5px;
    }
    #pdf-content .noconf-table .label {
      font-weight: bold;
      background: #f0f0f0;
    }
    #pdf-content .signatures {
      margin-top: 16px;
    }
    #pdf-content .signatures table {
      border: none;
    }
    #pdf-content .signatures td {
      border: none;
      padding: 4px 8px;
      font-size: 9.5px;
      width: 50%;
    }
    #pdf-content .sig-line {
      border-bottom: 1px solid #333;
      min-height: 20px;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <!-- Status UI -->
  <div class="status-container" id="statusUI">
    <h1>Generando PDF del Checklist</h1>
    <p>FC-PR-35 — Lista de Chequeo para Recibo de Componentes de Empaque</p>
    <div class="spinner" id="spinner"></div>
    <p id="statusMsg">Procesando datos...</p>
  </div>

  <!-- Hidden PDF Content (this gets converted to PDF) -->
  <div id="pdf-content"></div>

  <script>
    // ========================================
    // 1. PARSE URL DATA
    // ========================================
    function getChecklistData() {
      const params = new URLSearchParams(window.location.search);
      const dataStr = params.get('data');
      if (!dataStr) {
        throw new Error('No se recibieron datos. Abre esta página desde Power Apps.');
      }
      try {
        return JSON.parse(decodeURIComponent(dataStr));
      } catch (e) {
        throw new Error('Error al leer los datos: ' + e.message);
      }
    }

    // ========================================
    // 2. RENDER FC-PR-35 FORMAT
    // ========================================
    function renderChecklist(data) {
      const muestras = typeof data.muestras === 'string' 
        ? JSON.parse(data.muestras) 
        : (data.muestras || []);

      const checkMark = (val) => {
        if (!val) return '';
        const isYes = val === 'Sí' || val === 'Si';
        return `<span class="check-mark ${isYes ? 'check-yes' : 'check-no'}">${isYes ? '✓' : '✗'}</span>`;
      };

      const siCol = (val) => {
        if (!val) return '<td></td><td></td>';
        const isYes = val === 'Sí' || val === 'Si';
        return `<td>${isYes ? checkMark(val) : ''}</td><td>${!isYes ? checkMark(val) : ''}</td>`;
      };

      const confClass = (val) => {
        if (!val || !val.Value) {
          const v = typeof val === 'string' ? val : '';
          return v === 'Conforme' ? 'conforme' : (v === 'No Conforme' ? 'no-conforme' : '');
        }
        return val.Value === 'Conforme' ? 'conforme' : 'no-conforme';
      };

      const confText = (val) => {
        if (!val) return '';
        const v = typeof val === 'string' ? val : (val.Value || '');
        return v === 'Conforme' ? 'C' : (v === 'No Conforme' ? 'NC' : v);
      };

      // Build samples rows
      let samplesRows = '';
      if (muestras.length > 0) {
        muestras.forEach((m, i) => {
          samplesRows += `
            <tr>
              <td>${m.Numero_Muestra || m.num || (i + 1)}</td>
              <td class="${confClass(m.ColorTextura || m.color)}">${confText(m.ColorTextura || m.color)}</td>
              <td class="${confClass(m.AparienciaExt || m.apExt)}">${confText(m.AparienciaExt || m.apExt)}</td>
              <td class="${confClass(m.AparienciaInt || m.apInt)}">${confText(m.AparienciaInt || m.apInt)}</td>
              <td class="${confClass(m.Poro || m.poro)}">${confText(m.Poro || m.poro)}</td>
              <td class="${confClass(m.Artes || m.artes)}">${confText(m.Artes || m.artes)}</td>
            </tr>`;
        });
      }

      // Non-conformity section
      const rechazo = data.rechazo || 'N/A';
      const showPartial = rechazo === 'No';

      const html = `
        <div class="doc-code">FC-PR-35 Rev.17</div>
        <div class="doc-title">LISTA DE CHEQUEO PARA EL RECIBO DE COMPONENTES DE EMPAQUE</div>

        <!-- HEADER TABLE -->
        <table class="header-table">
          <tr>
            <td class="label">No. Lote:</td>
            <td class="value"><strong>${data.lote || ''}</strong></td>
            <td class="label">Producto:</td>
            <td class="value"><strong>${data.producto || ''}</strong></td>
          </tr>
          <tr>
            <td class="label">Fecha:</td>
            <td class="value">${data.fecha || ''}</td>
            <td class="label">Tamaño del lote:</td>
            <td class="value">${data.tamLote || ''} &nbsp;&nbsp; <em>(Muestreo: ${data.tamMuestreo || ''})</em></td>
          </tr>
        </table>

        <!-- ITEMS TABLE -->
        <table class="items-table">
          <thead>
            <tr>
              <th>ITEMS</th>
              <th>Sí</th>
              <th>No</th>
              <th>Comentarios / Observaciones</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1. Transporte con condiciones apropiadas (¿es seguro para descargar?).</td>
              ${siCol(data.item1)}
              <td>${data.item1obs || ''}</td>
            </tr>
            <tr>
              <td>2. Daños visibles en componentes debido al transporte.</td>
              ${siCol(data.item2)}
              <td>${data.item2obs || ''}</td>
            </tr>
            <tr>
              <td>3. La cantidad en la Guía de entrega es igual a la cantidad entregada.</td>
              ${siCol(data.item3)}
              <td>${data.item3obs || ''}</td>
            </tr>
            <tr>
              <td>4. Cantidad recibida igual a cantidad ordenada.</td>
              ${siCol(data.item4)}
              <td>${data.item4obs || ''}</td>
            </tr>
            <tr>
              <td>5. Certificado de calidad es entregado con los componentes.</td>
              ${siCol(data.item5)}
              <td>${data.item5obs || ''}</td>
            </tr>
            <tr>
              <td>6. Cantidad de unidades de empaque inspeccionadas.</td>
              <td colspan="2" style="text-align:center;"><strong>${data.item6 || ''}</strong></td>
              <td>${data.item6obs || ''}</td>
            </tr>
          </tbody>
        </table>

        <!-- SECTION 7: SAMPLES -->
        <div class="section-title">7. Los componentes cumplen los requerimientos de: Características Verificadas</div>
        <table class="samples-table">
          <thead>
            <tr>
              <th style="width:10%">N° muestra</th>
              <th style="width:18%">Color y Textura (1)</th>
              <th style="width:18%">Apariencia Exterior (2)</th>
              <th style="width:18%">Apariencia Interior (3)</th>
              <th style="width:18%">Poro (4)</th>
              <th style="width:18%">Artes (5)</th>
            </tr>
          </thead>
          <tbody>
            ${samplesRows || '<tr><td colspan="6" style="text-align:center; color:#999;">Sin muestras registradas</td></tr>'}
          </tbody>
        </table>

        <!-- NOTES -->
        <div class="notes-section">
          <p><strong>Notas:</strong></p>
          <p><strong>(1)</strong> Verificar color y textura en baldes/bombonas/botellas/cilindros/etiquetas, de acuerdo con el patrón físico aprobado.</p>
          <p><strong>(2)</strong> Que estén limpio externamente (baldes/bombonas/botellas/cilindros/etiquetas/cajas). Sin abolladuras. Para cajas corrugadas verificar que no estén mojadas o con manchas de agua.</p>
          <p><strong>(3)</strong> En botellas/baldes/bombonas/cilindros: Verificar visualmente la limpieza interior, sin polvo, sin material extraño.</p>
          <p><strong>(4)</strong> Verificar que las botellas/baldes/bombonas de plástico no tengan poros o cortes en el cuerpo del envase.</p>
          <p><strong>(5)</strong> Aplica a etiquetas/litografía/cajas/láminas/sachets: texto claro y de acuerdo al estándar aprobado. Información completa y correcta.</p>
        </div>

        <!-- NON-CONFORMITY SECTION -->
        <div class="section-title" style="background:#fff3cd; border-color:#d97706;">En Caso de Componentes No Conformes</div>
        <table class="noconf-table">
          <tr>
            <td class="label" style="width:40%">1. Se rechaza todo el lote:</td>
            <td>
              SÍ ${rechazo === 'Sí' || rechazo === 'Si' ? '☑' : '☐'} &nbsp;&nbsp;
              NO ${rechazo === 'No' ? '☑' : '☐'} &nbsp;&nbsp;
              N/A ${rechazo === 'N/A' ? '☑' : '☐'}
            </td>
          </tr>
          ${showPartial ? `
          <tr>
            <td class="label">2. Revisión del lote en planta:</td>
            <td></td>
          </tr>
          <tr>
            <td style="padding-left:20px;">Cantidad aceptada:</td>
            <td><strong>${data.cantAcep || ''}</strong></td>
          </tr>
          <tr>
            <td style="padding-left:20px;">Cantidad rechazada:</td>
            <td><strong>${data.cantRech || ''}</strong></td>
          </tr>
          <tr>
            <td class="label">Comentarios de la revisión:</td>
            <td>${data.comentNC || ''}</td>
          </tr>
          ` : ''}
        </table>

        <!-- SIGNATURES -->
        <div class="signatures">
          <table>
            <tr>
              <td>
                <strong>Inspección realizada por:</strong>
                <div class="sig-line"></div>
                <div style="margin-top:4px;">${data.inspector || ''}</div>
              </td>
              <td>
                <strong>Aprobado por:</strong> <em>(solo en caso de no-conformidad)</em>
                <div class="sig-line"></div>
                <div style="margin-top:4px;">${data.aprobador || ''}</div>
              </td>
            </tr>
          </table>
        </div>
      `;

      document.getElementById('pdf-content').innerHTML = html;
    }

    // ========================================
    // 3. GENERATE PDF
    // ========================================
    async function generatePDF(data) {
      const filename = `${data.id || 'CHK'}_${(data.producto || 'PRODUCTO').replace(/\s+/g, '-')}_${(data.lote || 'LOTE').replace(/\s+/g, '-')}_${(data.fecha || '').replace(/\//g, '')}.pdf`;

      const element = document.getElementById('pdf-content');
      
      const opt = {
        margin:       [10, 10, 10, 10],
        filename:     filename,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
      };

      // Make content visible for rendering
      element.style.left = '0';
      element.style.position = 'relative';

      await html2pdf().set(opt).from(element).save();

      // Hide again
      element.style.left = '-9999px';
      element.style.position = 'absolute';

      return filename;
    }

    // ========================================
    // 4. MAIN EXECUTION
    // ========================================
    async function main() {
      const statusMsg = document.getElementById('statusMsg');
      const spinner = document.getElementById('spinner');

      try {
        // Step 1: Parse data
        statusMsg.textContent = 'Leyendo datos del checklist...';
        const data = getChecklistData();

        // Step 2: Render HTML
        statusMsg.textContent = 'Generando formato FC-PR-35...';
        renderChecklist(data);

        // Small delay for rendering
        await new Promise(r => setTimeout(r, 500));

        // Step 3: Generate PDF
        statusMsg.textContent = 'Convirtiendo a PDF...';
        const filename = await generatePDF(data);

        // Step 4: Success
        spinner.style.display = 'none';
        statusMsg.innerHTML = `<span class="success">✓ PDF generado exitosamente</span><br><br>
          <span style="color:#94a3b8; font-size:13px;">Archivo: <strong>${filename}</strong></span><br>
          <span style="color:#94a3b8; font-size:12px;">El PDF se descargó automáticamente a tu dispositivo.</span><br>
          <span style="color:#94a3b8; font-size:12px;">Súbelo a la carpeta Checklists_PDF en SharePoint.</span>`;

        // Show download button in case auto-download didn't work
        const btn = document.createElement('button');
        btn.className = 'btn-download';
        btn.textContent = 'Descargar PDF nuevamente';
        btn.onclick = () => generatePDF(data);
        statusMsg.appendChild(document.createElement('br'));
        statusMsg.appendChild(document.createElement('br'));
        statusMsg.appendChild(btn);

        // Add "close" button
        const btnClose = document.createElement('button');
        btnClose.className = 'btn-download';
        btnClose.style.background = '#334155';
        btnClose.style.marginLeft = '12px';
        btnClose.textContent = 'Cerrar';
        btnClose.onclick = () => window.close();
        statusMsg.appendChild(btnClose);

      } catch (err) {
        spinner.style.display = 'none';
        statusMsg.innerHTML = `<span class="error">✗ Error: ${err.message}</span><br><br>
          <span style="color:#94a3b8; font-size:12px;">Verifica que hayas abierto esta página desde Power Apps.</span>`;
      }
    }

    // Run on page load
    window.addEventListener('DOMContentLoaded', main);
  </script>
</body>
</html>
